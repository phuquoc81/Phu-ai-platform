name: Phu AI Platform
description: >
  Help teachers and students solve complex math, physics, and puzzle problems
  with Phu AI. Upgrade to Phu AI Pro ($1.99/month via Stripe) for advanced
  step-by-step solutions.
author: phuquoc81
branding:
  icon: cpu
  color: blue

# Define your inputs here.
inputs:
  problem:
    description: >
      Natural-language description of the problem to solve (math, physics, or
      puzzle).
    required: true
  problem_type:
    description: >
      Category of the problem. Must be one of: math, physics, puzzle. Defaults
      to math.
    required: false
    default: math
  subscription_token:
    description: >
      Phu AI Pro subscription token issued after a successful Stripe payment
      ($1.99/month). Leave empty to use the free tier.
    required: false
    default: ''

# Define your outputs here.
outputs:
  solution:
    description: >
      The solution produced by Phu AI for the given problem.
  plan:
    description: >
      The active subscription plan (e.g. "Phu AI (Free)" or "Phu AI Pro
      ($1.99/month)").

runs:
  using: node24
  main: dist/index.js
